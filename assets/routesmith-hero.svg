<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">RouteSmith hero illustration</title>
  <desc id="desc">A single coding prompt branches into planning, coding, testing, docs, and review tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#16243a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12233a"/>
      <stop offset="100%" stop-color="#1c3553"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#79a6ff"/>
    </marker>
    <style>
      .title { font: 700 56px Arial, sans-serif; fill: #f5f7fb; }
      .subtitle { font: 400 26px Arial, sans-serif; fill: #c6d2e3; }
      .kicker { font: 600 18px Arial, sans-serif; fill: #8fb4ff; letter-spacing: 1px; text-anchor: middle; }
      .prompt-line { font: 700 28px Arial, sans-serif; fill: #eff6ff; text-anchor: middle; }
      .prompt-body { font: 400 20px Arial, sans-serif; fill: #d6e3f5; text-anchor: middle; }
      .task-label { font: 700 24px Arial, sans-serif; fill: #eff6ff; text-anchor: middle; }
      .task-body { font: 400 18px Arial, sans-serif; fill: #d6e3f5; text-anchor: middle; }
      .note { font: 500 18px Arial, sans-serif; fill: #d6e3f5; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="220" fill="#1f4a7a" opacity="0.14"/>
  <circle cx="220" cy="760" r="260" fill="#2c7fb8" opacity="0.10"/>

  <text x="110" y="120" class="kicker" text-anchor="start">ROUTESMITH</text>
  <text x="110" y="190" class="title">One Prompt. Multiple Jobs.</text>
  <text x="110" y="235" class="subtitle">A host-aware routing layer for coding agents</text>

  <rect x="90" y="300" rx="30" ry="30" width="560" height="320" fill="url(#card)" stroke="#3b5f87" stroke-width="2" filter="url(#shadow)"/>
  <text x="370" y="355" class="kicker">INPUT PROMPT</text>
  <text x="370" y="425" class="prompt-line">Plan this feature, implement it,</text>
  <text x="370" y="465" class="prompt-line">add tests, write docs, and review</text>
  <text x="370" y="505" class="prompt-line">the final result.</text>
  <text x="370" y="560" class="prompt-body">Mixed prompts are workflows, not single tasks.</text>

  <path d="M650 460 C 770 460, 810 192, 930 192" fill="none" stroke="#79a6ff" stroke-width="6" opacity="0.85" marker-end="url(#arrow)"/>
  <path d="M650 460 C 770 460, 820 322, 930 322" fill="none" stroke="#79a6ff" stroke-width="6" opacity="0.85" marker-end="url(#arrow)"/>
  <path d="M650 460 C 770 460, 820 452, 930 452" fill="none" stroke="#79a6ff" stroke-width="6" opacity="0.85" marker-end="url(#arrow)"/>
  <path d="M650 460 C 770 460, 820 582, 930 582" fill="none" stroke="#79a6ff" stroke-width="6" opacity="0.85" marker-end="url(#arrow)"/>
  <path d="M650 460 C 770 460, 810 712, 930 712" fill="none" stroke="#79a6ff" stroke-width="6" opacity="0.85" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="950" y="140" rx="24" ry="24" width="300" height="104" fill="#183456" stroke="#4d79b8" stroke-width="2"/>
    <rect x="950" y="270" rx="24" ry="24" width="300" height="104" fill="#173b49" stroke="#4aa3c0" stroke-width="2"/>
    <rect x="950" y="400" rx="24" ry="24" width="300" height="104" fill="#263a56" stroke="#6aa0ff" stroke-width="2"/>
    <rect x="950" y="530" rx="24" ry="24" width="300" height="104" fill="#23394a" stroke="#6bc2b0" stroke-width="2"/>
    <rect x="950" y="660" rx="24" ry="24" width="300" height="104" fill="#3a324f" stroke="#b48cff" stroke-width="2"/>
  </g>

  <text x="1100" y="172" class="kicker">TASK 01</text>
  <text x="1100" y="205" class="task-label">Planning</text>

  <text x="1100" y="302" class="kicker">TASK 02</text>
  <text x="1100" y="335" class="task-label">Coding</text>

  <text x="1100" y="432" class="kicker">TASK 03</text>
  <text x="1100" y="465" class="task-label">Testing</text>

  <text x="1100" y="562" class="kicker">TASK 04</text>
  <text x="1100" y="595" class="task-label">Docs</text>

  <text x="1100" y="692" class="kicker">TASK 05</text>
  <text x="1100" y="725" class="task-label">Review</text>

  <text x="1290" y="430" class="note">Detect host</text>
  <text x="1290" y="462" class="note">Map capability</text>
  <text x="1290" y="494" class="note">Route honestly</text>
  <text x="1290" y="526" class="note">Learn from runs</text>
</svg>
